<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scroll-City · PDF to Seed Tool</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 1100px;
            margin: 2rem auto;
            padding: 1rem;
            background: #f4f1eb;
            color: #1e1e1e;
        }
        h1 { color: #1e1e1e; display: flex; align-items: center; gap: 0.5rem; }
        h1 small { font-size: 0.8rem; font-weight: normal; color: #777; }
        .upload-area {
            border: 2px dashed #FACC0F;
            padding: 2rem;
            text-align: center;
            border-radius: 12px;
            background: #fff;
            cursor: pointer;
            transition: background 0.2s;
            margin: 1.5rem 0;
        }
        .upload-area:hover { background: #fdf8ee; }
        .upload-area input[type="file"] { display: none; }
        .upload-area label { font-size: 1.2rem; color: #555; cursor: pointer; }
        .upload-area label i { font-size: 3rem; color: #FACC0F; display: block; margin-bottom: 0.5rem; }
        .status { margin: 1rem 0; font-weight: 600; padding: 0.5rem 1rem; border-radius: 8px; background: #fff; border: 1px solid #ddd; }
        .status.success { border-color: #2ecc71; background: #eafaf1; }
        .status.error { border-color: #e74c3c; background: #fdedec; }
        #output { display: none; margin-top: 2rem; }
        #output h3 { margin-bottom: 0.5rem; }
        textarea {
            width: 100%;
            height: 300px;
            font-family: 'Courier New', monospace;
            font-size: 0.8rem;
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 0.8rem;
            background: #faf8f5;
            resize: vertical;
        }
        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            margin-top: 1rem;
            align-items: center;
        }
        button {
            padding: 0.6rem 1.5rem;
            border: none;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            background: #FACC0F;
            color: #1e1e1e;
        }
        button:hover { background: #d4a800; }
        button.secondary { background: #eee; color: #333; }
        button.secondary:hover { background: #ddd; }
        button.danger { background: #e74c3c; color: #fff; }
        button.danger:hover { background: #c0392b; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .summary {
            background: #fff;
            padding: 1rem;
            border-radius: 12px;
            border: 1px solid #ddd;
            margin-top: 1rem;
        }
        .summary span { font-weight: 600; color: #1e1e1e; }
        .upload-status { margin-top: 0.5rem; padding: 0.5rem; border-radius: 8px; }
    </style>
</head>
<body>

    <h1>📄 Scroll-City · PDF to Seed <small>local tool</small></h1>
    <p>Upload a market report (PDF) and we'll extract listings, stats, news, and events. Then <strong>seed them directly</strong> to your live API.</p>

    <div class="upload-area" id="dropZone">
        <label for="fileInput">
            <i>📤</i>
            Click or drag a PDF file here
        </label>
        <input type="file" id="fileInput" accept=".pdf" />
    </div>

    <div id="status" class="status">📎 Ready</div>

    <div id="output">
        <h3>📊 Extracted Data</h3>
        <textarea id="jsonOutput" readonly></textarea>
        <div class="actions">
            <button onclick="copyJSON()">📋 Copy JSON</button>
            <button onclick="downloadJSON()">⬇️ Download JSON</button>
            <button id="seedBtn" onclick="seedToAPI()" style="background:#27ae60; color:#fff;">🚀 Upload to API</button>
            <span id="seedStatus"></span>
        </div>
        <div id="seedSummary" class="summary" style="display:none;"></div>
    </div>

    <script>
        // ─── pdf.js setup ────────────────────────────────────
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const statusDiv = document.getElementById('status');
        const outputDiv = document.getElementById('output');
        const jsonOutput = document.getElementById('jsonOutput');
        const seedBtn = document.getElementById('seedBtn');
        const seedStatus = document.getElementById('seedStatus');
        const seedSummary = document.getElementById('seedSummary');

        let parsedData = null;

        // ─── Drag & drop ─────────────────────────────────────
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.style.background = '#fdf8ee'; });
        dropZone.addEventListener('dragleave', () => { dropZone.style.background = '#fff'; });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.style.background = '#fff';
            const files = e.dataTransfer.files;
            if (files.length) handleFile(files[0]);
        });
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) handleFile(e.target.files[0]);
        });

        // ─── File handler ────────────────────────────────────
        function handleFile(file) {
            if (file.type !== 'application/pdf') {
                setStatus('❌ Please upload a PDF file.', 'error');
                return;
            }
            setStatus('⏳ Reading PDF...', '');
            const reader = new FileReader();
            reader.onload = function() {
                const typedArray = new Uint8Array(reader.result);
                pdfjsLib.getDocument(typedArray).promise.then(pdf => {
                    extractText(pdf).then(text => {
                        setStatus('🔄 Parsing content...', '');
                        const parsed = parseText(text);
                        parsedData = parsed;
                        const json = JSON.stringify(parsed, null, 2);
                        jsonOutput.value = json;
                        outputDiv.style.display = 'block';
                        seedBtn.disabled = false;
                        seedStatus.textContent = '';
                        seedSummary.style.display = 'none';
                        const total = parsed.listings.length + parsed.stats.length + parsed.news.length + parsed.events.length;
                        setStatus(`✅ Extracted: ${parsed.listings.length} listings, ${parsed.stats.length} stats, ${parsed.news.length} news, ${parsed.events.length} events (${total} total items)`, 'success');
                    }).catch(err => {
                        setStatus('❌ Error extracting text: ' + err.message, 'error');
                    });
                }).catch(err => {
                    setStatus('❌ Error reading PDF: ' + err.message, 'error');
                });
            };
            reader.readAsArrayBuffer(file);
        }

        // ─── Extract text from PDF ──────────────────────────
        function extractText(pdf) {
            let fullText = '';
            const pagePromises = [];
            for (let i = 1; i <= pdf.numPages; i++) {
                pagePromises.push(pdf.getPage(i).then(page => page.getTextContent()));
            }
            return Promise.all(pagePromises).then(pageContents => {
                pageContents.forEach(content => {
                    content.items.forEach(item => { fullText += item.str + ' '; });
                    fullText += '\n';
                });
                return fullText;
            });
        }

        // ─── Parse text into structured data ────────────────
        function parseText(text) {
            const listings = [];
            const stats = [];
            const news = [];
            const events = [];

            const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);

            // ─── Listings ────────────────────────────────────
            const addressRegex = /\d{1,5}\s+[A-Za-z0-9\s.,]+(?:St|Ave|Rd|Blvd|Dr|Ln|Ct|Way|Pkwy|Parkway|Boulevard|Street|Avenue|Road|Lane|Court|Drive|Pl|Place|Cir|Circle|Terrace|Ter|Trl|Trail|Hwy|Highway)/i;
            const priceRegex = /\$\s*([\d,]+)/;
            const bedsRegex = /(\d+)\s*(?:bed|br|bedroom)/i;
            const bathsRegex = /(\d+\.?\d*)\s*(?:bath|ba|bathroom)/i;
            const sqftRegex = /(\d+[,.\d]*)\s*(?:sq\s*ft|sqft|square\s*feet?)/i;
            const mlsRegex = /MLS\s*ID:\s*([A-Z0-9]+)/i;

            let i = 0;
            while (i < lines.length) {
                const line = lines[i];
                if (addressRegex.test(line) || line.includes('MLS ID')) {
                    let address = line.match(addressRegex)?.[0] || '';
                    let priceMatch = line.match(priceRegex) || lines[i+1]?.match(priceRegex);
                    let price = priceMatch ? parseInt(priceMatch[1].replace(/,/g, '')) : null;
                    let beds = line.match(bedsRegex)?.[1] || lines[i+1]?.match(bedsRegex)?.[1] || null;
                    let baths = line.match(bathsRegex)?.[1] || lines[i+1]?.match(bathsRegex)?.[1] || null;
                    let sqft = line.match(sqftRegex)?.[1] || lines[i+1]?.match(sqftRegex)?.[1] || null;
                    let mls = line.match(mlsRegex)?.[1] || lines[i+1]?.match(mlsRegex)?.[1] || null;
                    let status = 'Active';
                    if (line.includes('Pending') || (lines[i+1] && lines[i+1].includes('Pending'))) status = 'Pending';
                    if (line.includes('Closed') || (lines[i+1] && lines[i+1].includes('Closed'))) status = 'Closed';

                    if (address && price) {
                        listings.push({
                            address,
                            city: 'Louisville',
                            state: 'KY',
                            zip: address.match(/\d{5}/)?.[0] || '',
                            price,
                            bedrooms: beds ? parseInt(beds) : null,
                            bathrooms: baths ? parseFloat(baths) : null,
                            sqft: sqft ? parseInt(sqft.replace(/,/g, '')) : null,
                            propertyType: 'Single Family',
                            status,
                            description: `MLS ID: ${mls || 'N/A'}`,
                            images: [],
                            source: 'PDF Import'
                        });
                    }
                }
                i++;
            }

            // ─── Stats ────────────────────────────────────────
            const statRegex = /(Median|Average|Total|New|Pending|Closed|Days on Market|Months of Inventory|Active Listings|List Price|Sold Price)\s*:?\s*(.*?)(?:\n|$)/i;
            for (const line of lines) {
                const match = line.match(statRegex);
                if (match) {
                    const metric = match[1].trim();
                    const value = match[2].trim().replace(/,$/, '');
                    if (/\d/.test(value)) {
                        stats.push({
                            metric,
                            value,
                            region: 'Louisville, KY',
                            category: 'Price',
                            source: 'PDF Report',
                            date: new Date()
                        });
                    }
                }
            }

            // ─── News ─────────────────────────────────────────
            const newsKeywords = ['approves', 'announced', 'new', 'breaks ground', 'development', 'market', 'prices', 'construction', 'grant'];
            for (const line of lines) {
                if (newsKeywords.some(kw => line.toLowerCase().includes(kw)) && line.length > 30 && line.length < 200) {
                    let headline = line;
                    let summary = '';
                    if (line.includes('.')) {
                        const parts = line.split('.');
                        headline = parts[0] + '.';
                        summary = parts.slice(1).join('. ').trim();
                    }
                    news.push({
                        headline: headline.slice(0, 100),
                        summary: summary || line.slice(0, 150),
                        category: 'Market',
                        source: 'PDF Report'
                    });
                }
            }

            // ─── Events ──────────────────────────────────────
            const eventKeywords = ['meeting', 'tour', 'webinar', 'open house', 'community', 'fair'];
            for (const line of lines) {
                if (eventKeywords.some(kw => line.toLowerCase().includes(kw)) && /\d{1,2}\/\d{1,2}/.test(line)) {
                    events.push({
                        title: line.slice(0, 80),
                        description: line.slice(0, 120),
                        location: 'Louisville, KY',
                        startDate: new Date(Date.now() + 7 * 24 * 60 * 60 * 1000),
                        type: 'Other'
                    });
                }
            }

            // Deduplicate listings by address
            const seen = new Set();
            const uniqueListings = listings.filter(l => {
                const key = l.address + l.price;
                if (seen.has(key)) return false;
                seen.add(key);
                return true;
            });

            return {
                listings: uniqueListings,
                stats: stats.slice(0, 20),
                news: news.slice(0, 10),
                events: events.slice(0, 5)
            };
        }

        // ─── UI helpers ──────────────────────────────────────
        function setStatus(msg, type) {
            statusDiv.textContent = msg;
            statusDiv.className = 'status';
            if (type === 'success') statusDiv.classList.add('success');
            else if (type === 'error') statusDiv.classList.add('error');
        }

        function copyJSON() {
            const text = jsonOutput.value;
            navigator.clipboard.writeText(text).then(() => alert('✅ Copied!')).catch(() => {
                jsonOutput.select();
                document.execCommand('copy');
                alert('✅ Copied!');
            });
        }

        function downloadJSON() {
            const text = jsonOutput.value;
            const blob = new Blob([text], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'seed-data.json';
            a.click();
            URL.revokeObjectURL(url);
        }

        // ─── Seed to API ─────────────────────────────────────
        async function seedToAPI() {
            if (!parsedData) {
                alert('No data to seed. Please upload a PDF first.');
                return;
            }
            if (!parsedData.listings.length && !parsedData.stats.length && !parsedData.news.length && !parsedData.events.length) {
                alert('No data found to seed. Please check your PDF.');
                return;
            }

            seedBtn.disabled = true;
            seedStatus.textContent = '⏳ Seeding...';
            seedSummary.style.display = 'none';

            try {
                const response = await fetch('/seed', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(parsedData)
                });
                const result = await response.json();
                if (response.ok) {
                    const { results } = result;
                    let summaryHTML = `<h4>✅ Seeding completed!</h4><ul>`;
                    for (const [key, val] of Object.entries(results)) {
                        summaryHTML += `<li><strong>${key}</strong>: ${val.count} items uploaded</li>`;
                    }
                    summaryHTML += `</ul>`;
                    seedSummary.innerHTML = summaryHTML;
                    seedSummary.style.display = 'block';
                    seedStatus.textContent = '✅ Done!';
                } else {
                    seedStatus.textContent = '❌ Error: ' + (result.error || 'Unknown error');
                }
            } catch (err) {
                seedStatus.textContent = '❌ Network error: ' + err.message;
            } finally {
                seedBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
