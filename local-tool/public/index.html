<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scroll-City · Admin Tool</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <style>
    /* (keep all existing styles – unchanged) */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      max-width: 1400px;
      margin: 2rem auto;
      padding: 1rem;
      background: #f4f1eb;
      color: #1e1e1e;
    }
    h1 { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem; }
    h1 small { font-size: 0.8rem; font-weight: normal; color: #777; }
    .tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .tab-btn {
      padding: 0.6rem 1.2rem;
      border: none;
      border-radius: 30px;
      background: #e2ddd6;
      color: #333;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .tab-btn.active { background: #FACC0F; color: #1e1e1e; }
    .tab-btn:hover { background: #d4c9b8; }
    .tab-content { display: none; animation: fadeIn 0.3s; }
    .tab-content.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .upload-area {
      border: 2px dashed #FACC0F;
      padding: 2rem;
      text-align: center;
      border-radius: 12px;
      background: #fff;
      cursor: pointer;
      transition: background 0.2s;
      margin: 1.5rem 0;
    }
    .upload-area:hover { background: #fdf8ee; }
    .upload-area input[type="file"] { display: none; }
    .upload-area label { font-size: 1.2rem; color: #555; cursor: pointer; }
    .upload-area label i { font-size: 3rem; color: #FACC0F; display: block; margin-bottom: 0.5rem; }

    .status { margin: 1rem 0; padding: 0.5rem 1rem; border-radius: 8px; background: #fff; border: 1px solid #ddd; font-weight: 600; }
    .status.success { border-color: #2ecc71; background: #eafaf1; }
    .status.error { border-color: #e74c3c; background: #fdedec; }

    textarea, input[type="text"], input[type="number"], select {
      width: 100%;
      padding: 0.6rem;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.9rem;
      background: #faf8f5;
    }
    textarea { resize: vertical; height: 100px; }

    .actions { display: flex; flex-wrap: wrap; gap: 1rem; margin-top: 1rem; align-items: center; }
    button {
      padding: 0.6rem 1.5rem;
      border: none;
      border-radius: 30px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      background: #FACC0F;
      color: #1e1e1e;
    }
    button:hover { background: #d4a800; }
    button.secondary { background: #eee; color: #333; }
    button.secondary:hover { background: #ddd; }
    button.danger { background: #e74c3c; color: #fff; }
    button.danger:hover { background: #c0392b; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button.success { background: #27ae60; color: #fff; }
    button.success:hover { background: #219a52; }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1rem;
      margin: 1rem 0;
    }
    .card {
      background: #fff;
      padding: 1rem;
      border-radius: 12px;
      border: 1px solid #ddd;
      text-align: center;
    }
    .card h3 { font-size: 1.8rem; color: #1e1e1e; margin: 0.2rem 0; }
    .card p { color: #777; font-size: 0.85rem; margin: 0; }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      font-size: 0.9rem;
    }
    th, td {
      padding: 0.6rem 0.8rem;
      text-align: left;
      border-bottom: 1px solid #eee;
    }
    th { background: #f8f6f2; font-weight: 600; }
    th input[type="checkbox"] { transform: scale(1.2); }
    td input[type="checkbox"] { transform: scale(1.2); }

    .data-form { background: #fff; padding: 1rem; border-radius: 12px; border: 1px solid #ddd; margin-bottom: 1.5rem; }
    .data-form .form-row { display: flex; flex-wrap: wrap; gap: 0.8rem; margin-bottom: 0.8rem; }
    .data-form .form-row > * { flex: 1; min-width: 150px; }

    .checkbox-group {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin: 0.5rem 0 1rem 0;
    }
    .checkbox-group label {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      font-weight: 500;
      cursor: pointer;
    }

    .table-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin: 1rem 0 0.5rem 0;
      align-items: center;
    }
    .table-actions .selected-count {
      font-weight: 600;
      color: #555;
    }

    @media (max-width: 640px) {
      .card-grid { grid-template-columns: 1fr 1fr; }
      .tabs { justify-content: center; }
    }
  </style>
</head>
<body>

  <h1>🛠️ Scroll-City Admin Tool <small>full control panel</small></h1>

  <div class="tabs">
    <button class="tab-btn active" data-tab="seed">📄 Seed PDF</button>
    <button class="tab-btn" data-tab="listings">🏠 Listings</button>
    <button class="tab-btn" data-tab="stats">📊 Stats</button>
    <button class="tab-btn" data-tab="news">📰 News</button>
    <button class="tab-btn" data-tab="events">📅 Events</button>
    <button class="tab-btn" data-tab="media">🎬 Media</button>
    <button class="tab-btn" data-tab="trending">📈 Trending</button>
    <button class="tab-btn" data-tab="bots">🤖 Bots</button>
    <button class="tab-btn" data-tab="dashboard">📊 Dashboard</button>
  </div>

  <!-- TAB: Seed PDF -->
  <div id="tab-seed" class="tab-content active">
    <p>Upload a PDF, JSON, HTML, or paste text – we'll extract listings, stats, news, events, trending topics, and media.</p>

    <div class="upload-area" id="dropZone">
      <label for="fileInput">
        <i>📤</i>
        Click or drag a file here (PDF, JSON, HTML, or TXT)
      </label>
      <input type="file" id="fileInput" accept=".pdf,.json,.html,.txt" />
    </div>

    <div style="margin: 1rem 0;">
      <label for="manualTextInput"><strong>Or paste text here:</strong></label>
      <textarea id="manualTextInput" placeholder="Paste any text (e.g., from a report, webpage, or document)..." rows="4"></textarea>
      <div class="actions" style="margin-top:0.5rem;">
        <button onclick="parseManualText()" class="secondary">📝 Parse Text</button>
        <span id="manualParseStatus"></span>
      </div>
    </div>

    <div class="checkbox-group">
      <label><input type="checkbox" id="extractListings" checked /> 🏠 Listings</label>
      <label><input type="checkbox" id="extractStats" checked /> 📊 Stats</label>
      <label><input type="checkbox" id="extractNews" checked /> 📰 News</label>
      <label><input type="checkbox" id="extractEvents" checked /> 📅 Events</label>
      <label><input type="checkbox" id="extractTrending" checked /> 📈 Trending Topics</label>
      <label><input type="checkbox" id="extractMedia" checked /> 🎬 Media</label>
    </div>

    <div id="status" class="status">📎 Ready</div>
    <div id="output" style="display:none;">
      <h3>📊 Extracted Data</h3>
      <textarea id="jsonOutput" readonly></textarea>
      <div class="actions">
        <button onclick="copyJSON()">📋 Copy JSON</button>
        <button onclick="downloadJSON()">⬇️ Download JSON</button>
        <button id="seedBtn" onclick="seedToAPI()" class="success">🚀 Upload to API</button>
        <span id="seedStatus"></span>
      </div>
      <div id="seedSummary" class="card-grid" style="display:none;"></div>
    </div>
  </div>

  <!-- Other tabs (listings, stats, etc.) remain unchanged – I'll omit for brevity, but they are identical to previous version -->
  <!-- ... -->

  <script>
    // ─── Tab switching ──────────────────────────────────────────
    const tabs = document.querySelectorAll('.tab-btn');
    const contents = {
      seed: document.getElementById('tab-seed'),
      listings: document.getElementById('tab-listings'),
      stats: document.getElementById('tab-stats'),
      news: document.getElementById('tab-news'),
      events: document.getElementById('tab-events'),
      media: document.getElementById('tab-media'),
      trending: document.getElementById('tab-trending'),
      bots: document.getElementById('tab-bots'),
      dashboard: document.getElementById('tab-dashboard')
    };
    // (keep your existing tab switching code – it's the same as before)

    // ─── PDF / File tool ──────────────────────────────────────────
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    const fileInput = document.getElementById('fileInput');
    const dropZone = document.getElementById('dropZone');
    const statusDiv = document.getElementById('status');
    const outputDiv = document.getElementById('output');
    const jsonOutput = document.getElementById('jsonOutput');
    const seedBtn = document.getElementById('seedBtn');
    const seedStatus = document.getElementById('seedStatus');
    const seedSummary = document.getElementById('seedSummary');
    const manualInput = document.getElementById('manualTextInput');

    let parsedData = null;

    // ─── Drag & drop ──────────────────────────────────────────────
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.style.background = '#fdf8ee'; });
    dropZone.addEventListener('dragleave', () => { dropZone.style.background = '#fff'; });
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.style.background = '#fff';
      const files = e.dataTransfer.files;
      if (files.length) handleFile(files[0]);
    });
    fileInput.addEventListener('change', (e) => {
      if (e.target.files.length) handleFile(e.target.files[0]);
    });

    // ─── Handle file upload ──────────────────────────────────────
    function handleFile(file) {
      const reader = new FileReader();
      const name = file.name.toLowerCase();
      if (file.type === 'application/pdf' || name.endsWith('.pdf')) {
        reader.onload = function() {
          const typedArray = new Uint8Array(reader.result);
          pdfjsLib.getDocument(typedArray).promise.then(pdf => {
            extractText(pdf).then(text => {
              parseAndDisplay(text);
            }).catch(err => setStatus('❌ PDF text error: ' + err.message, 'error'));
          }).catch(err => setStatus('❌ PDF read error: ' + err.message, 'error'));
        };
        reader.readAsArrayBuffer(file);
      } else if (name.endsWith('.json')) {
        reader.onload = function() {
          try {
            const json = JSON.parse(reader.result);
            parsedData = json;
            displayParsedData(json);
            setStatus('✅ JSON loaded successfully', 'success');
          } catch (e) {
            setStatus('❌ Invalid JSON: ' + e.message, 'error');
          }
        };
        reader.readAsText(file);
      } else {
        reader.onload = function() {
          const text = reader.result;
          parseAndDisplay(text);
        };
        reader.readAsText(file);
      }
    }

    // ─── Parse and display text ──────────────────────────────────
    function parseAndDisplay(text) {
      setStatus('🔄 Parsing content...', '');
      const parsed = parseText(text);
      parsedData = parsed;
      displayParsedData(parsed);
      const total = parsed.listings.length + parsed.stats.length + parsed.news.length + parsed.events.length + parsed.trending.length + parsed.media.length;
      setStatus(`✅ Extracted: ${parsed.listings.length} listings, ${parsed.stats.length} stats, ${parsed.news.length} news, ${parsed.events.length} events, ${parsed.trending.length} trending topics, ${parsed.media.length} media items (${total} total items)`, 'success');
    }

    function displayParsedData(data) {
      jsonOutput.value = JSON.stringify(data, null, 2);
      outputDiv.style.display = 'block';
      seedBtn.disabled = false;
      seedStatus.textContent = '';
      seedSummary.style.display = 'none';
    }

    function parseManualText() {
      const text = manualInput.value.trim();
      if (!text) {
        document.getElementById('manualParseStatus').textContent = '❌ Please paste some text.';
        return;
      }
      document.getElementById('manualParseStatus').textContent = '⏳ Parsing...';
      parseAndDisplay(text);
      document.getElementById('manualParseStatus').textContent = '✅ Parsed!';
    }

    // ─── Extract text from PDF ──────────────────────────────────
    function extractText(pdf) {
      let fullText = '';
      const pagePromises = [];
      for (let i = 1; i <= pdf.numPages; i++) {
        pagePromises.push(pdf.getPage(i).then(page => page.getTextContent()));
      }
      return Promise.all(pagePromises).then(pageContents => {
        pageContents.forEach(content => {
          content.items.forEach(item => { fullText += item.str + ' '; });
          fullText += '\n';
        });
        return fullText;
      });
    }

    // ─── Enhanced parser ─────────────────────────────────────────
    function parseText(text) {
      const listings = [];
      const stats = [];
      const news = [];
      const events = [];
      const trending = [];
      const media = [];

      const extractListings = document.getElementById('extractListings').checked;
      const extractStats = document.getElementById('extractStats').checked;
      const extractNews = document.getElementById('extractNews').checked;
      const extractEvents = document.getElementById('extractEvents').checked;
      const extractTrending = document.getElementById('extractTrending').checked;
      const extractMedia = document.getElementById('extractMedia').checked;

      // Normalize: replace multiple spaces/newlines
      const normalized = text.replace(/\s+/g, ' ').trim();
      const lines = normalized.split('\n').map(l => l.trim()).filter(l => l.length > 0);

      let currentSection = '';

      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];

        // Detect section headers
        if (/LISTINGS/i.test(line) && /TABLE/i.test(line)) {
          currentSection = 'listings';
          continue;
        }
        if (/MARKET STATS/i.test(line)) {
          currentSection = 'stats';
          continue;
        }
        if (/NEWS HEADLINES/i.test(line)) {
          currentSection = 'news';
          continue;
        }
        if (/UPCOMING EVENTS/i.test(line)) {
          currentSection = 'events';
          continue;
        }
        if (/TRENDING TOPICS/i.test(line)) {
          currentSection = 'trending';
          continue;
        }
        if (/MEDIA/i.test(line)) {
          currentSection = 'media';
          continue;
        }

        // Skip separators
        if (/[-=_*]{10,}/.test(line)) continue;

        // ─── Listings ──────────────────────────────────────────────
        if (currentSection === 'listings' && extractListings) {
          // Look for address + price pattern
          const addrPrice = line.match(/^([A-Za-z0-9\s.,]+?)\s+(\$\s*[\d,]+)/);
          if (addrPrice) {
            const address = addrPrice[1].trim();
            const price = parseInt(addrPrice[2].replace(/[$,]/g, ''));
            // Now extract extra details from same line or next lines
            let beds = null, baths = null, sqft = null, status = 'Active', mls = '';
            // Try to find beds, baths, sqft, status, MLS in the line
            const bedsMatch = line.match(/\b(\d+)\s*(?:bed|br)\b/i);
            const bathsMatch = line.match(/\b(\d+\.?\d*)\s*(?:bath|ba)\b/i);
            const sqftMatch = line.match(/\b([\d,]+)\s*(?:sq\s*ft|sqft)\b/i);
            const statusMatch = line.match(/\b(Active|Pending|Closed|Under Contract|Sold)\b/i);
            const mlsMatch = line.match(/MLS\s*ID:\s*([A-Z0-9\-]+)/i);
            if (bedsMatch) beds = parseInt(bedsMatch[1]);
            if (bathsMatch) baths = parseFloat(bathsMatch[1]);
            if (sqftMatch) sqft = parseInt(sqftMatch[1].replace(/,/g, ''));
            if (statusMatch) status = statusMatch[1];
            if (mlsMatch) mls = mlsMatch[1];

            // If not found, look ahead one line
            if ((!beds || !baths || !sqft) && i + 1 < lines.length) {
              const nextLine = lines[i + 1];
              const bedsNext = nextLine.match(/\b(\d+)\s*(?:bed|br)\b/i);
              const bathsNext = nextLine.match(/\b(\d+\.?\d*)\s*(?:bath|ba)\b/i);
              const sqftNext = nextLine.match(/\b([\d,]+)\s*(?:sq\s*ft|sqft)\b/i);
              if (bedsNext && !beds) beds = parseInt(bedsNext[1]);
              if (bathsNext && !baths) baths = parseFloat(bathsNext[1]);
              if (sqftNext && !sqft) sqft = parseInt(sqftNext[1].replace(/,/g, ''));
            }

            if (address && price) {
              const zipMatch = address.match(/\b(\d{5})\b/);
              const zip = zipMatch ? zipMatch[1] : '';
              listings.push({
                address,
                city: 'Louisville',
                state: 'KY',
                zip,
                price,
                bedrooms: beds || null,
                bathrooms: baths || null,
                sqft: sqft || null,
                propertyType: 'Single Family',
                status: status || 'Active',
                description: `MLS ID: ${mls || 'N/A'}`,
                images: [],
                source: 'PDF Import'
              });
            }
          }
        }

        // ─── Stats ──────────────────────────────────────────────────
        if (currentSection === 'stats' && extractStats) {
          const statMatch = line.match(/^([^:]+)\s*:\s*(.*)$/);
          if (statMatch) {
            const metric = statMatch[1].trim();
            const value = statMatch[2].trim().replace(/,$/, '');
            if (metric && value && /\d/.test(value)) {
              stats.push({
                metric,
                value,
                region: 'Louisville, KY',
                category: 'Price',
                source: 'PDF Report',
                date: new Date()
              });
            }
          }
        }

        // ─── News ──────────────────────────────────────────────────
        if (currentSection === 'news' && extractNews) {
          const newsMatch = line.match(/^(\d+\.)\s*(.*?)(?:\.\s*|$)/);
          if (newsMatch) {
            const headline = newsMatch[2].trim();
            let summary = '';
            let j = i + 1;
            while (j < lines.length && !/^\d+\./.test(lines[j]) && !/^-+/.test(lines[j]) && !/^Source:/i.test(lines[j])) {
              summary += ' ' + lines[j];
              j++;
            }
            summary = summary.trim();
            if (headline && headline.length > 10) {
              news.push({
                headline: headline.slice(0, 100),
                summary: summary.slice(0, 200) || headline.slice(0, 150),
                category: 'Market',
                source: 'PDF Report',
                link: ''
              });
            }
          }
        }

        // ─── Events ─────────────────────────────────────────────────
        if (currentSection === 'events' && extractEvents) {
          const titleMatch = line.match(/^(\d+\.)\s*(.*?)\s*$/);
          if (titleMatch) {
            const title = titleMatch[2].trim();
            let description = '', location = '';
            let startDate = new Date(Date.now() + 7 * 24 * 60 * 60 * 1000);
            let j = i + 1;
            while (j < lines.length && !/^\d+\./.test(lines[j]) && !/^-+/.test(lines[j])) {
              const detail = lines[j];
              if (/Date:/i.test(detail)) {
                const dateStr = detail.replace(/Date:/i, '').trim();
                const parsed = new Date(dateStr);
                if (!isNaN(parsed)) startDate = parsed;
              } else if (/Location:/i.test(detail)) {
                location = detail.replace(/Location:/i, '').trim();
              } else if (/Description:/i.test(detail)) {
                description = detail.replace(/Description:/i, '').trim();
              } else {
                description += ' ' + detail;
              }
              j++;
            }
            description = description.trim();
            if (title) {
              events.push({
                title: title.slice(0, 80),
                description: description.slice(0, 120) || title,
                location: location || 'Louisville, KY',
                startDate,
                endDate: null,
                type: 'Other',
                link: ''
              });
            }
          }
        }

        // ─── Trending ──────────────────────────────────────────────
        if (currentSection === 'trending' && extractTrending) {
          const trendMatch = line.match(/^[-•*]\s*(.*)$/);
          if (trendMatch) {
            const headline = trendMatch[1].trim();
            let detail = '';
            let j = i + 1;
            while (j < lines.length && !/^[-•*]/.test(lines[j]) && !/^-+/.test(lines[j])) {
              detail += ' ' + lines[j];
              j++;
            }
            detail = detail.trim() || 'Market trend in Kentucky.';
            if (headline) {
              trending.push({
                headline: headline.slice(0, 100),
                detail: detail.slice(0, 200),
                source: 'PDF Report',
                active: true
              });
            }
          }
        }

        // ─── Media ──────────────────────────────────────────────────
        if (currentSection === 'media' && extractMedia) {
          const urlMatch = line.match(/(https?:\/\/[^\s]+)/);
          if (urlMatch) {
            const url = urlMatch[1];
            let title = '';
            const prefixMatch = line.match(/^(Video|Image):\s*(.*?)\s*$/i);
            if (prefixMatch) {
              title = prefixMatch[2].trim();
            } else {
              title = line.replace(url, '').trim().slice(0, 80) || 'Media item';
            }
            const type = url.includes('youtube') || url.includes('youtu.be') || url.includes('vimeo') ? 'video' : 'image';
            media.push({
              title: title.slice(0, 80),
              description: title.slice(0, 120),
              type,
              url,
              thumbnail: '',
              source: 'PDF Import',
              active: true
            });
          }
        }

        // Reset section
        if (/================================================================================/.test(line)) {
          currentSection = '';
        }
      }

      // Deduplicate listings by address
      const seen = new Set();
      const uniqueListings = listings.filter(l => {
        const key = l.address + l.price;
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
      });

      return {
        listings: uniqueListings,
        stats: stats.slice(0, 20),
        news: news.slice(0, 10),
        events: events.slice(0, 5),
        trending: trending.slice(0, 10),
        media: media.slice(0, 15)
      };
    }

    // ─── UI helpers ──────────────────────────────────────────────
    // (copyJSON, downloadJSON, seedToAPI – same as before, but with logging)

    // ─── Seed to API ──────────────────────────────────────────────
    async function seedToAPI() {
      if (!parsedData) {
        alert('No data to seed. Please upload or parse text first.');
        return;
      }
      const total = parsedData.listings.length + parsedData.stats.length + parsedData.news.length + parsedData.events.length + parsedData.trending.length + parsedData.media.length;
      if (total === 0) {
        alert('No data found to seed. Check your checkboxes and try again.');
        return;
      }

      seedBtn.disabled = true;
      seedStatus.textContent = '⏳ Seeding...';
      seedSummary.style.display = 'none';

      try {
        const response = await fetch('/seed', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(parsedData)
        });
        const result = await response.json();
        if (response.ok) {
          const { results } = result;
          let html = '';
          for (const [key, val] of Object.entries(results)) {
            html += `<div class="card"><h3>${val.count}</h3><p>${key}</p></div>`;
          }
          seedSummary.innerHTML = html;
          seedSummary.style.display = 'grid';
          seedStatus.textContent = '✅ Done!';
        } else {
          seedStatus.textContent = '❌ Error: ' + (result.error || 'Unknown error');
        }
      } catch (err) {
        seedStatus.textContent = '❌ Network error: ' + err.message;
      } finally {
        seedBtn.disabled = false;
      }
    }

    // ─── Other functions (loadTable, addItem, etc.) remain unchanged ──
    // (keep your existing code – we only replaced parseText and seedToAPI)
  </script>
</body>
</html>
