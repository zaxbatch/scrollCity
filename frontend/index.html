<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scroll-City · Kentucky Real Estate Social</title>
    <link rel="stylesheet" href="./css/styles.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.6.9/angular.min.js"></script>

    <style>
        /* ... all existing styles ... */
        /* add styles for video modal */
        .sc-video-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10000;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: all 0.25s ease;
        }
        .sc-video-modal.active {
            visibility: visible;
            opacity: 1;
        }
        .sc-video-modal-content {
            position: relative;
            width: 90%;
            max-width: 800px;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        }
        .sc-video-modal-content iframe {
            width: 100%;
            aspect-ratio: 16/9;
            border: none;
            display: block;
        }
        .sc-video-modal-close {
            position: absolute;
            top: -40px;
            right: 0;
            background: none;
            border: none;
            color: #fff;
            font-size: 2rem;
            cursor: pointer;
            opacity: 0.8;
            transition: opacity 0.2s;
        }
        .sc-video-modal-close:hover {
            opacity: 1;
        }
        .sc-video-link {
            display: inline-block;
            background: #faf8f5;
            padding: 0.5rem 1rem;
            border-radius: 30px;
            border: 1px solid #ddd;
            color: #1e1e1e;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .sc-video-link:hover {
            background: #f0ede8;
            border-color: #FACC0F;
        }
        /* ... rest of existing styles ... */
    </style>
</head>
<body>

    <!-- HEADER -->
    <header class="header-banner">
        <div class="social-links">
            <img src="./images/logo/logo02.svg" alt="LPT Logo" class="header-logo" />
            <div class="header-nav-links">
                <a href="../index.html"><i class="fas fa-home"></i> Main Site</a>
                <a href="tel:5022995252"><i class="fas fa-phone"></i> Call Me</a>
                <a href="mailto:zerricdotcom@gmail.com"><i class="fas fa-envelope"></i> Email</a>
            </div>
        </div>
    </header>

    <!-- ANGULAR APP -->
    <div ng-app="scrollCityApp" ng-controller="ScrollCityCtrl">

        <!-- MAIN LAYOUT -->
        <div class="sc-main-wrapper">
            <!-- LEFT SIDEBAR -->
            <aside class="sc-sidebar">
                <!-- ... same as before ... -->
                <div class="sc-brand">...</div>
                <nav class="sc-nav">...</nav>
                <div class="sc-sidebar-footer">...</div>
            </aside>

            <!-- CENTER FEED -->
            <main class="sc-feed">
                <!-- COMPOSER -->
                <div class="sc-composer" ng-if="currentUser">...</div>
                <div class="sc-composer sc-composer-guest" ng-if="!currentUser">...</div>

                <!-- SORT -->
                <div class="sc-feed-sort">...</div>

                <!-- POSTS -->
                <div class="sc-posts">
                    <div class="sc-post" ng-repeat="post in feedPosts | orderBy:'-createdAt' track by post._id">
                        <div class="sc-post-avatar">...</div>
                        <div class="sc-post-body">
                            <div class="sc-post-header">...</div>
                            <div class="sc-post-content" ng-bind-html="post.content | trusted"></div>
                            <div class="sc-post-media" ng-if="post.image">
                                <img ng-src="{{post.image}}" alt="Post image" />
                            </div>
                            <!-- VIDEO LINK – now opens modal -->
                            <div class="sc-post-media" ng-if="post.video">
                                <span class="sc-video-link" ng-click="openVideo(post.video)">
                                    <i class="fab fa-youtube" style="color:#FF0000; margin-right: 0.5rem;"></i>
                                    Watch on YouTube
                                </span>
                            </div>
                            <div class="sc-post-stats">...</div>
                            <div class="sc-comments" ng-if="post.showComments">...</div>
                        </div>
                    </div>
                </div>

                <!-- BOT ACTIVITY -->
                <div class="sc-bot-activity">...</div>
            </main>

            <!-- RIGHT SIDEBAR -->
            <aside class="sc-sidebar-right">...</aside>
        </div> <!-- /.sc-main-wrapper -->

        <!-- MODAL (Signup/Login/Profile) -->
        <div class="sc-modal" id="sc-modal" ng-class="{'active': modalActive}">...</div>

        <!-- VIDEO MODAL (NEW) -->
        <div class="sc-video-modal" ng-class="{'active': videoModalActive}">
            <div class="sc-video-modal-content">
                <button class="sc-video-modal-close" ng-click="closeVideo()">&times;</button>
                <iframe ng-src="{{videoEmbedUrl}}" frameborder="0" allowfullscreen></iframe>
            </div>
            <div class="sc-modal-overlay" ng-click="closeVideo()"></div>
        </div>

    </div> <!-- /ng-app -->

    <!-- FOOTER -->
    <footer>...</footer>

    <script src="./js/script.js"></script>
</body>
</html>
